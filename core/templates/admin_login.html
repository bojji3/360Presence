<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360Presence — Admin Login</title>
    <link rel="icon" type="image/x-icon" href="/static/react/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ground: #f4f3ef;
            --ground-2: #eceae4;
            --hair: #dcd9cf;
            --hair-2: #c6c3b7;
            --ink: #141412;
            --ink-2: #2a2a26;
            --muted: #7a766d;
            --muted-2: #a9a59a;
            --sans: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
            --inter: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--ink);
            color: var(--ground);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--ink-2);
            border: 1px solid #34332d;
            border-radius: 16px;
            padding: 48px 40px;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand svg {
            margin-bottom: 20px;
        }

        .brand h1 {
            font-family: var(--sans);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--ground);
        }

        .brand p {
            font-family: var(--inter);
            font-size: 15px;
            color: var(--muted);
            margin-top: 8px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-family: var(--inter);
            font-size: 14px;
            font-weight: 600;
            color: var(--ground);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-family: var(--inter);
            font-size: 16px;
            border: 1.5px solid #34332d;
            border-radius: 10px;
            background: var(--ink);
            color: var(--ground);
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--ground);
            background: #1a1a16;
            box-shadow: 0 0 0 3px rgba(244, 243, 239, 0.08);
        }

        input::placeholder {
            color: var(--muted);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-family: var(--inter);
            font-size: 16px;
            font-weight: 600;
            background: var(--ground);
            color: var(--ink);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background: var(--ground-2);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            margin-top: 28px;
            text-align: center;
            font-family: var(--inter);
            font-size: 14px;
            color: var(--muted);
        }

        .links a {
            color: var(--ground);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--muted);
            transition: border-color 0.2s;
        }

        .links a:hover {
            border-color: var(--ground);
        }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-family: var(--inter);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(220, 38, 38, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        .message.success {
            display: block;
            background: rgba(22, 163, 74, 0.15);
            color: #86efac;
            border: 1px solid rgba(22, 163, 74, 0.3);
        }

        .footer {
            text-align: center;
            padding: 24px;
            font-family: var(--inter);
            font-size: 13px;
            color: var(--muted);
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 12px;
                border: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="brand">
                <svg width="56" height="56" viewBox="0 0 40 40" fill="none">
                    <rect x="0.5" y="0.5" width="39" height="39" stroke="#f4f3ef" stroke-width="1.25"/>
                    <circle cx="20" cy="20" r="12" stroke="#f4f3ef" stroke-width="1.25"/>
                    <circle cx="20" cy="20" r="5" stroke="#f4f3ef" stroke-width="1.25"/>
                    <circle cx="20" cy="20" r="1.5" fill="#f4f3ef"/>
                    <line x1="20" y1="4" x2="20" y2="9" stroke="#f4f3ef" stroke-width="1.25"/>
                    <line x1="20" y1="31" x2="20" y2="36" stroke="#f4f3ef" stroke-width="1.25"/>
                    <line x1="4" y1="20" x2="9" y2="20" stroke="#f4f3ef" stroke-width="1.25"/>
                    <line x1="31" y1="20" x2="36" y2="20" stroke="#f4f3ef" stroke-width="1.25"/>
                </svg>
                <h1>Admin Portal</h1>
                <p>Event Administrator Login</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" placeholder="Enter admin username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="submitBtn">Sign In</button>
            </form>

            <div class="links">
                <a href="/student-login/">Student login</a>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <div class="footer">
        © 2026 · The Presence Bureau
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            msg.className = 'message';
            msg.textContent = '';

            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: 'admin' })
                });

                const data = await response.json();

                if (data.success) {
                    msg.className = 'message success';
                    msg.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/admin-dashboard/';
                    }, 800);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error || 'Login failed. Please try again.';
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = 'Connection error. Please ensure the server is running.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
