<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360Presence — Student Registration</title>
    <link rel="icon" type="image/x-icon" href="/static/react/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ground: #f4f3ef;
            --ground-2: #eceae4;
            --hair: #dcd9cf;
            --hair-2: #c6c3b7;
            --ink: #141412;
            --ink-2: #2a2a26;
            --muted: #7a766d;
            --muted-2: #a9a59a;
            --sans: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
            --inter: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--ground);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: white;
            border: 1px solid var(--hair);
            border-radius: 16px;
            padding: 48px 40px;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand svg {
            margin-bottom: 20px;
        }

        .brand h1 {
            font-family: var(--sans);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .brand p {
            font-family: var(--inter);
            font-size: 15px;
            color: var(--muted);
            margin-top: 8px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-family: var(--inter);
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-family: var(--inter);
            font-size: 16px;
            border: 1.5px solid var(--hair);
            border-radius: 10px;
            background: var(--ground);
            color: var(--ink);
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--ink);
            background: white;
            box-shadow: 0 0 0 3px rgba(20, 20, 18, 0.08);
        }

        input::placeholder {
            color: var(--muted-2);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-family: var(--inter);
            font-size: 16px;
            font-weight: 600;
            background: var(--ink);
            color: var(--ground);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background: var(--ink-2);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            margin-top: 28px;
            text-align: center;
            font-family: var(--inter);
            font-size: 14px;
            color: var(--muted);
        }

        .links a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--hair-2);
            transition: border-color 0.2s;
        }

        .links a:hover {
            border-color: var(--ink);
        }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-family: var(--inter);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .message.error {
            display: block;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .message.success {
            display: block;
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .footer {
            text-align: center;
            padding: 24px;
            font-family: var(--inter);
            font-size: 13px;
            color: var(--muted-2);
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 12px;
                border: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="brand">
                <svg width="56" height="56" viewBox="0 0 40 40" fill="none">
                    <rect x="0.5" y="0.5" width="39" height="39" stroke="#141412" stroke-width="1.25"/>
                    <circle cx="20" cy="20" r="12" stroke="#141412" stroke-width="1.25"/>
                    <circle cx="20" cy="20" r="5" stroke="#141412" stroke-width="1.25"/>
                    <circle cx="20" cy="20" r="1.5" fill="#141412"/>
                    <line x1="20" y1="4" x2="20" y2="9" stroke="#141412" stroke-width="1.25"/>
                    <line x1="20" y1="31" x2="20" y2="36" stroke="#141412" stroke-width="1.25"/>
                    <line x1="4" y1="20" x2="9" y2="20" stroke="#141412" stroke-width="1.25"/>
                    <line x1="31" y1="20" x2="36" y2="20" stroke="#141412" stroke-width="1.25"/>
                </svg>
                <h1>Create Account</h1>
                <p>Student Registration</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" placeholder="Enter your first name" required>
                </div>
                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" placeholder="Enter your last name" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number <span style="color: var(--muted-2); font-weight: 400;">(optional)</span></label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" autocomplete="tel">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" placeholder="Confirm your password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn" id="submitBtn">Create Account</button>
            </form>

            <div class="links">
                Already have an account? <a href="/student-login/">Sign in</a>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <div class="footer">
        © 2026 · The Presence Bureau
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');

            if (password !== confirm) {
                msg.className = 'message error';
                msg.textContent = 'Passwords do not match.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            msg.className = 'message';
            msg.textContent = '';

            const data = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password
            };

            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    msg.className = 'message success';
                    msg.textContent = 'Registration successful! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = '/student-login/';
                    }, 1500);
                } else {
                    msg.className = 'message error';
                    msg.textContent = result.error || 'Registration failed. Please try again.';
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = 'Connection error. Please ensure the server is running.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
